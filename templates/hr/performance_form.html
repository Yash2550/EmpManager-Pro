{% extends "base.html" %}
{% block title %}Add Performance Review — EmpManager Pro{% endblock %}
{% block page_title %}Add Performance Review{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3><i class="fas fa-star"></i> New Performance Review</h3>
        <a href="{{ url_for('hr.performance') }}" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i>
            Back</a>
    </div>
    <div class="card-body">
        <form method="POST" class="employee-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="employee_id">Employee *</label>
                    <select id="employee_id" name="employee_id" required>
                        <option value="">Select Employee</option>
                        {% for emp in employees %}
                        <option value="{{ emp.id }}">{{ emp.full_name }} ({{ emp.emp_code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="period">Period *</label>
                    <input type="text" id="period" name="period" placeholder="e.g. Q1-2026" required>
                </div>
                <div class="form-group">
                    <label for="rating">Rating (1-5) *</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" step="0.1" required>
                </div>
                <div class="form-group">
                    <label for="goals_met">Goals Met</label>
                    <input type="number" id="goals_met" name="goals_met" min="0">
                </div>
                <div class="form-group">
                    <label for="goals_total">Goals Total</label>
                    <input type="number" id="goals_total" name="goals_total" min="0">
                </div>
                <div class="form-group">
                    <label for="reviewer_id">Reviewer</label>
                    <select id="reviewer_id" name="reviewer_id">
                        <option value="">Select Reviewer</option>
                        {% for emp in employees %}
                        <option value="{{ emp.id }}">{{ emp.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group form-group-full">
                    <label for="strengths">Strengths</label>
                    <textarea id="strengths" name="strengths" rows="3"></textarea>
                </div>
                <div class="form-group form-group-full">
                    <label for="improvements">Areas for Improvement</label>
                    <textarea id="improvements" name="improvements" rows="3"></textarea>
                </div>
                <div class="form-group form-group-full">
                    <label for="comments">Comments</label>
                    <textarea id="comments" name="comments" rows="3"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('hr.performance') }}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Submit Review</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
